{{define "breadcrumbs"}}
{{if .SEO}}{{if .SEO.Breadcrumbs}}
<nav aria-label="Breadcrumb" class="bg-black/50 border-b border-gray-800/60 py-2">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <ol class="flex items-center gap-1.5 text-xs text-gray-500" itemscope itemtype="https://schema.org/BreadcrumbList">
      <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
        <a itemprop="item" href="/" class="hover:text-purple-400 transition-colors flex items-center gap-1" aria-label="Home">
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
          <span itemprop="name">Home</span>
        </a>
        <meta itemprop="position" content="1">
      </li>
      {{range $i, $b := .SEO.Breadcrumbs}}
      <li class="flex items-center gap-1.5" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
        <svg class="w-3 h-3 text-gray-700 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        {{if $b.URL}}
        <a itemprop="item" href="{{$b.URL}}" class="hover:text-purple-400 transition-colors"><span itemprop="name">{{$b.Name}}</span></a>
        {{else}}
        <span itemprop="name" class="text-gray-300" aria-current="page">{{$b.Name}}</span>
        {{end}}
        <meta itemprop="position" content="{{add $i 2}}">
      </li>
      {{end}}
    </ol>
  </div>
</nav>
{{end}}{{end}}
{{end}}
