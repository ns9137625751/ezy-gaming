version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: ezygaming_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: ezygamingzone
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ezygaming_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_PORT: 8080
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ezygamingzone
      DB_USER: root
      DB_PASS: secret
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
    volumes:
      - ./static/uploads:/app/static/uploads

volumes:
  mysqldata:
